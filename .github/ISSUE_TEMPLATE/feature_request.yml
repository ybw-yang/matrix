name: Feature request
description: Propose an improvement to the public runtime, tooling, or docs
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Explain the user need rather than only the desired implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Expected scope
      options:
        - Public runtime repository only
        - Requires engine-source changes
        - Documentation only
        - Unsure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note affected robots, maps, release assets, or existing scripts.
